<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botify Education</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 60px;
            background: #111111;
            border-right: 2px solid #00ff00;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .sidebar.expanded {
            width: 280px;
            padding: 20px;
        }

        .menu-btn {
            background: linear-gradient(145deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            transition: all 0.3s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.3s ease 0.1s;
        }

        .sidebar.expanded .logo {
            opacity: 1;
            transform: translateX(0);
        }

        .new-conversation {
            background: linear-gradient(145deg, #222222, #111111);
            border: 2px solid #00ff00;
            border-radius: 12px;
            padding: 0;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-20px);
            height: 0;
            overflow: hidden;
            margin: 10px 0;
        }

        .sidebar.expanded .new-conversation {
            padding: 15px;
            opacity: 1;
            transform: translateX(0);
            height: auto;
        }

        .new-conversation:hover {
            background: linear-gradient(145deg, #333333, #222222);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 0, 0.2);
        }

        .tools-wrapper {
            flex: 1;
            overflow: hidden;
            opacity: 0;
            max-height: 0;
            transform: translateX(-20px);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s;
        }

        .sidebar.expanded .tools-wrapper {
            opacity: 1;
            max-height: 1000px;
            transform: translateX(0);
        }

        .tools-section {
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .tool-group {
            margin-bottom: 25px;
        }

        .group-title {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tool {
            background: linear-gradient(145deg, #222222, #111111);
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .tool:hover {
            border-color: #00ff00;
            background: linear-gradient(145deg, #333333, #222222);
            transform: translateX(5px);
        }

        .tool-icon {
            width: 20px;
            height: 20px;
            background: #00ff00;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            gap: 15px;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: #00ff00 #111111;
        }

        .chat-messages {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 100%;
            gap: 15px;
        }

        .welcome-section {
            text-align: center;
            opacity: 0.8;
            margin: auto 0;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 300;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: #00ff00;
            font-weight: 400;
        }

        .message-bubble {
            background: #222222;
            border-radius: 18px;
            padding: 12px 18px;
            max-width: 70%;
            border: 1px solid #333333;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(145deg, #00ff00, #00cc00);
            color: #000000;
            font-weight: 500;
            margin-left: auto;
        }

        .bot-message {
            align-self: flex-start;
            background: linear-gradient(145deg, #1a1a1a, #222222);
        }

        .input-section {
            display: flex;
            gap: 10px;
            padding: 20px 0;
            border-top: 1px solid #333333;
        }

        .message-input {
            flex: 1;
            background: #111111;
            border: 2px solid #333333;
            border-radius: 25px;
            padding: 15px 20px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
            max-height: 120px;
            overflow-y: hidden;
        }

        .message-input::placeholder {
            color: #888888;
        }

        .message-input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .send-button {
            background: linear-gradient(145deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .send-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Custom scrollbar for chat area */
        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #111111;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: linear-gradient(145deg, #00ff00, #00cc00);
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #00ff00;
        }

        /* Hide textarea scrollbar */
        .message-input::-webkit-scrollbar {
            display: none;
        }

        .tools-section::-webkit-scrollbar {
            width: 6px;
        }

        .tools-section::-webkit-scrollbar-track {
            background: #111111;
        }

        .tools-section::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .sidebar.expanded {
                width: 250px;
            }
            .welcome-title {
                font-size: 24px;
            }
            .welcome-subtitle {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <button class="menu-btn" id="menuBtn">☰</button>
        
        <div class="logo">Botify Education</div>
        
        <div class="new-conversation" id="newConv">
            ➕ New Conversation
        </div>

        <div class="tools-wrapper">
            <div class="tools-section">
                <div class="tool-group">
                    <div class="group-title">Education Tools</div>
                    <div class="tool">
                        <div class="tool-icon">📚</div>
                        <span>Study Helper</span>
                    </div>
                    <div class="tool">
                        <div class="tool-icon">✏️</div>
                        <span>Essay Writer</span>
                    </div>
                    <div class="tool">
                        <div class="tool-icon">📊</div>
                        <span>Math Solver</span>
                    </div>
                    <div class="tool">
                        <div class="tool-icon">🔬</div>
                        <span>Science Tutor</span>
                    </div>
                </div>

                <div class="tool-group">
                    <div class="group-title">Productivity</div>
                    <div class="tool">
                        <div class="tool-icon">📝</div>
                        <span>Flashcards</span>
                    </div>
                    <div class="tool">
                        <div class="tool-icon">🎯</div>
                        <span>Quiz Generator</span>
                    </div>
                    <div class="tool">
                        <div class="tool-icon">📈</div>
                        <span>Progress Tracker</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-area" id="chatArea">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-section">
                    <div class="welcome-title">Hi, welcome to Botify Education AI</div>
                    <div class="welcome-subtitle">Ask anything</div>
                </div>
            </div>
        </div>
        
        <div class="input-section">
            <textarea class="message-input" id="messageInput" placeholder="Type your message here..." rows="1"></textarea>
            <button class="send-button" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('menuBtn');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatArea = document.getElementById('chatArea');
        const chatMessages = document.getElementById('chatMessages');
        const newConv = document.getElementById('newConv');

        let isSidebarExpanded = localStorage.getItem('sidebarExpanded') === 'true';

        // Load saved chat history
        function loadChatHistory() {
            const savedMessages = localStorage.getItem('chatMessages');
            if (savedMessages) {
                const messages = JSON.parse(savedMessages);
                chatMessages.innerHTML = '';
                messages.forEach(msg => {
                    addMessage(msg.text, msg.isUser);
                });
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        }

        // Save chat history
        function saveChatHistory() {
            const messages = Array.from(chatMessages.querySelectorAll('.message-bubble')).map(el => ({
                text: el.textContent,
                isUser: el.classList.contains('user-message')
            }));
            localStorage.setItem('chatMessages', JSON.stringify(messages));
        }

        // Toggle full sidebar
        menuBtn.addEventListener('click', () => {
            isSidebarExpanded = !isSidebarExpanded;
            sidebar.classList.toggle('expanded', isSidebarExpanded);
            localStorage.setItem('sidebarExpanded', isSidebarExpanded);
        });

        // Initialize sidebar state
        if (isSidebarExpanded) {
            sidebar.classList.add('expanded');
        }

        // New conversation - clear chat
        newConv.addEventListener('click', () => {
            chatMessages.innerHTML = `
                <div class="welcome-section">
                    <div class="welcome-title">Hi, welcome to Botify Education AI</div>
                    <div class="welcome-subtitle">Ask anything</div>
                </div>
            `;
            localStorage.removeItem('chatMessages');
            chatArea.scrollTop = chatArea.scrollHeight;
        });

        // Send message functionality
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message-bubble ${isUser ? 'user-message' : 'bot-message'}`;
            messageDiv.textContent = text;
            chatMessages.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            saveChatHistory();
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendMessage() {
            const message = messageInput.value.trim();
            if (message) {
                addMessage(message, true);
                messageInput.value = '';
                messageInput.style.height = 'auto';
                
                // Simulate bot response
                sendBtn.disabled = true;
                messageInput.disabled = true;
                setTimeout(() => {
                    addMessage('Botify Education AI is coming soon! 🚀\n\nYour message: "' + message + '" has been saved and will be processed when we launch.');
                    sendBtn.disabled = false;
                    messageInput.disabled = false;
                    messageInput.focus();
                }, 1000);
            }
        }

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Load chat history on page load
        loadChatHistory();

        // Save on page unload
        window.addEventListener('beforeunload', saveChatHistory);
    </script>
</body>
</html>
