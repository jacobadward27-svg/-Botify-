<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOTIFY - Generative AI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f4c1e, #1a5f2a, #0d3a1a);
    height: 100vh;
    color: #e0e6ed;
}

/* Layout */
.container {
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* Header */
.header {
    padding: 16px 24px;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
}

.logo {
    font-size: 24px;
    font-weight: bold;
    color: #4ade80;
}

/* Chat */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Messages */
.message {
    max-width: 70%;
    padding: 14px 18px;
    border-radius: 18px;
    line-height: 1.4;
}

.user-message {
    align-self: flex-end;
    background: #4ade80;
    color: black;
}

.bot-message {
    align-self: flex-start;
    background: rgba(255,255,255,0.1);
}

/* Input */
.input-container {
    position: sticky;
    bottom: 0;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.input-wrapper {
    display: flex;
    gap: 10px;
}

.textarea {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    resize: none;
    font-size: 15px;
}

.send-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    background: #4ade80;
    cursor: pointer;
    font-size: 18px;
}

/* Welcome */
.welcome {
    text-align: center;
    margin-top: 50px;
    opacity: 0.7;
}

/* Mobile */
@media (max-width: 600px) {
    .message {
        max-width: 90%;
        font-size: 14px;
    }

    .logo {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">BOTIFY</div>
    </div>

    <div class="chat-container">

        <div class="chat-messages" id="chatMessages">
            <div class="welcome">
                <h2>Welcome to BOTIFY</h2>
                <p>Ask anything...</p>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="messageInput" class="textarea" placeholder="Type a message..."></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>

    </div>
</div>

<script>
const chatMessages = document.getElementById("chatMessages");
const messageInput = document.getElementById("messageInput");

/* Auto resize */
messageInput.addEventListener("input", () => {
    messageInput.style.height = "auto";
    messageInput.style.height = messageInput.scrollHeight + "px";
});

/* Add message */
function addMessage(text, isUser=false) {
    const div = document.createElement("div");
    div.className = "message " + (isUser ? "user-message" : "bot-message");
    div.innerHTML = text;

    chatMessages.appendChild(div);

    chatMessages.scrollTo({
        top: chatMessages.scrollHeight,
        behavior: "smooth"
    });
}

/* Send */
function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;

    addMessage(text, true);
    messageInput.value = "";
    messageInput.style.height = "auto";

    const typing = document.createElement("div");
    typing.className = "message bot-message";
    typing.innerHTML = "Typing...";
    chatMessages.appendChild(typing);

    setTimeout(() => {
        typing.remove();

        let reply = text.toLowerCase().includes("hi") || text.toLowerCase().includes("hello")
            ? "Hello 👋 Welcome to BOTIFY! (AI coming soon)"
            : "Thanks for your message! AI features coming soon.";

        addMessage(reply);
    }, 800);
}

/* Enter key */
messageInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
